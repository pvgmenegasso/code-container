version: "3.8"
services:
  caddy:
    image: docker.io/caddy
    ports: 
      - "8443:443"
      - "8080:80" 
    volumes: 
      - ./Caddyfile:/etc/caddy/Caddyfile
    networks:
      - proxy

  code:
    image: pvgm/code-container:local
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./container-home:/home/dev/workspace:z
      - code-container-data:/home/dev/.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    #extra_hosts:
      #- "visualstudiocode-local.localhost:8000"
  obsidian:
    image: docker.io/linuxserver/obsidian
    volumes:
      - code-container-data:/home/
