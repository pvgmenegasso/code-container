version: "3.8"
services:
  code:
    image: pvgm/code-container:local
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./container-home/.local:/home/dev/.local:z
      - ./container-home/.config:/home/dev/.config:z
      - ./container-home/container-workspace:/home/dev/workspace:z
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

